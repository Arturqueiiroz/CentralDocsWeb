<header class="header">
  <div class="menu-esquerda">
    <button class="btn-menu" aria-label="Abrir menu">
      <i class="fa-solid fa-bars"></i>
    </button>

    <div class="logo">
      <img src="/img/LogoCentralDocsNova.png" alt="Logo CentralDocs" />
    </div>
  </div>

  <div class="barra-pesquisa">
    <input type="text" placeholder="o que você está procurando?" />

    <button class="btn-microfone" aria-label="Pesquisar por voz">
      <i class="fa-solid fa-microphone"></i>
    </button>
  </div>

  <div class="acoes-direita">
    <button class="btn-icone" aria-label="Pesquisar">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>

    <button class="btn-icone perfil" aria-label="Perfil">
      <i class="fa-solid fa-circle-user"></i>
    </button>
  </div>
</header>
