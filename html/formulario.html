<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulários</title>

<link rel="stylesheet" href="../css/formulario.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body>

<div class="form-container">
    
<a href="../html/telaPrincipal.html" class="voltar">← Voltar</a>

<form action="https://jkorpela.fi/cgi-bin/echo.cgi" method="post">

<h2>Cadastro CentralDocs</h2>

<fieldset>
<legend>Dados Pessoais</legend>

<label for="nome">Nome:</label>
<input type="text" id="nome" name="nome" placeholder="Nome" required>

<label for="email">E-mail:</label>
<input type="email" name="email" id="email">

</fieldset>

<fieldset>
<legend>Dados de Acesso</legend>

<div class="radio-group">
<input type="radio" name="tipo" id="aluno" value="aluno">
<label for="aluno">Aluno</label>

<input type="radio" name="tipo" id="professor" value="professor">
<label for="professor">Professor</label>
</div>

<label for="senha">Senha:</label>

<div class="entrada">
<input onkeyup="senhaForte()" type="password" name="senha" id="senha">
<button type="button" onclick="verSenha()" id="olho" class="bi bi-eye"></button>
</div>

<p><span id="mensagem-senha"></span></p>

<label for="senha2">Verificar Senha:</label>
<input onkeyup="senhaIgual()" type="password" id="senha2" disabled>

<p><span id="mensagem-senha2"></span></p>

</fieldset>

<fieldset>
<legend>Informações Adicionais</legend>

<select name="nivel" id="nivel" required>
<option value="">Escolha seu nível</option>
<option value="iniciante">Iniciante</option>
<option value="intermediario">Intermediário</option>
<option value="avancado">Avançado</option>
</select>

<textarea name="msg" id="msg"
placeholder="Digite sua mensagem aqui..."></textarea>

<div class="check">
<input type="checkbox" name="promo" id="promo" value="sim" checked>
<label for="promo">Desejo receber promoções</label>
</div>

</fieldset>

<div class="buttons">
<input type="reset" value="Limpar">
<input type="submit" value="Cadastrar" disabled id="enviar">
</div>

</form>

</div>

<script src="../javacript/talaPrincipall.js"></script>

</body>
</html>
