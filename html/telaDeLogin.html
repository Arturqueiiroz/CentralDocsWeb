<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/telaDeLogin.css">
    <title>TelaDeLogin</title>
</head>

<body>
    <section class="sessao">
        <div class="ImagemDiv">
            <img class="imagem" src="/img/LogoCentralDocsNova.png" alt="LogoCentralDocsNova">
        </div>
        <h1>Faça Login</h1>
        <div class="formularioDiv">
            <form class="formulario">
                <label for="Email">Email:</label>
                <input type="text" id="email" placeholder="Email:" name="email">

                <label for="Senha">Senha:</label>
                <input type="password" name="senha" id="senha" placeholder="Senha:">
                <a class="esqueceuSenha" href="./esqueceuSenha.html">Esqueceu a senha?</a>

            </form>                
            <div class="divButton">
                    <button id="btnEntrar" class="button">Entrar</button>
                </div>
            <div>
                <p class="texto">Ainda não faz parte do CentralDocs? <a href="/html/cadastre.html">Cadastre-se</a></p>
            </div>
        </div>
                <div id="mensagemCard" class="mensagem-card oculto">
            <div class="mensagem-conteudo">
                <p id="mensagemTexto"></p>
            </div>
        </div>
    </section>
    <script src="/javacript/telaDeLogin.js"></script>
</body>
</html>
